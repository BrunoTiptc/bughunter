name: QA JS Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  qa-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Verificar Node
        run: node -v

      - name: Build backend Docker
        run: docker build -t bughunter-backend ./backend

      - name: Rodar backend container
        run: docker run -d -p 5000:5000 bughunter-backend

      - name: Aguardar backend subir
        run: sleep 5

      - name: Rodar testes QA (Node)
        run: node qa-tests/run-tests.js